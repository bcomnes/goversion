rules:
  dependabot-cooldown:
    config:
      days: 1
  unpinned-uses:
    config:
      policies:
        # Official GitHub actions and CodeQL use major tags for compatible security updates.
        "actions/*": ref-pin
        "github/codeql-action/*": ref-pin
        # Require immutable references for every third-party action.
        "*": hash-pin
